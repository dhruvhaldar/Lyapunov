<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyapunov Control Dashboard</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/glass.css">
    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Load D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <div class="container">
        <header class="glass-panel" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h1>Lyapunov Control Workbench</h1>
                <p>Nonlinear Control Playground & Simulator</p>
            </div>
            <div class="controls" style="margin-top: 0; padding-top: 0; border-top: none;">
                <label for="system-select" style="margin-right: 8px; display: inline-flex; align-items: center; gap: 8px;">
                    System Model:
                    <kbd id="kbd-s" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px 6px; font-size: 0.8em; font-family: monospace; color: #06b6d4; transition: transform 0.1s ease, background-color 0.1s ease;" aria-hidden="true">S</kbd>
                    <span class="sr-only">Press S to focus</span>
                </label>
                <select id="system-select">
                    <option value="VanDerPol">Van der Pol</option>
                    <option value="Pendulum">Pendulum</option>
                    <option value="Lorenz">Lorenz</option>
                </select>
            </div>
        </header>

        <main id="main-content" tabindex="-1" style="position: relative; transition: opacity 0.3s ease; outline: none;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 400px), 1fr)); gap: 2rem; margin-bottom: 2rem;">
            <div class="glass-panel" role="region" aria-labelledby="heading-phase">
                <h2 id="heading-phase">Phase Portrait</h2>
                <div id="phase-portrait" role="img" tabindex="0" aria-label="Interactive phase portrait showing system trajectories and vector fields" style="width: 100%; height: 400px; background: rgba(0,0,0,0.2); border-radius: 8px;"></div>
            </div>

            <div class="glass-panel" role="region" aria-labelledby="heading-time">
                <h2 id="heading-time">Time Response</h2>
                <div style="height: 400px;">
                    <canvas id="time-response-chart" role="img" tabindex="0" aria-label="Interactive time response chart showing system states over time">
                        Your browser does not support the canvas element. This visualization shows the time response of the selected system.
                    </canvas>
                </div>
            </div>
        </div>

        <div class="glass-panel" role="region" aria-labelledby="heading-3d">
             <h2 id="heading-3d">3D Visualization</h2>
             <div id="3d-view" role="img" tabindex="0" aria-label="Interactive 3D visualization of the dynamical system" style="width: 100%; height: 400px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                <div class="paused-badge" aria-hidden="true">⏸ Paused</div>
             </div>
        </div>
        </main>
    </div>

    <!-- Application Scripts -->
    <script src="js/phase_portrait.js"></script>
    <script src="js/time_response.js"></script>
    <script src="js/systems_gl.js"></script>
    <script>
        // Main initialization
        document.addEventListener('DOMContentLoaded', () => {
            const systemSelect = document.getElementById('system-select');

            // Add a visually hidden element for a11y announcements
            const announcer = document.createElement('div');
            announcer.setAttribute('aria-live', 'polite');
            announcer.style.position = 'absolute';
            announcer.style.width = '1px';
            announcer.style.height = '1px';
            announcer.style.padding = '0';
            announcer.style.margin = '-1px';
            announcer.style.overflow = 'hidden';
            announcer.style.clip = 'rect(0, 0, 0, 0)';
            announcer.style.whiteSpace = 'nowrap';
            announcer.style.border = '0';
            document.body.appendChild(announcer);

            function syncContextLabels() {
                const originalText = systemSelect.options[systemSelect.selectedIndex].text;
                document.getElementById('heading-phase').textContent = `Phase Portrait: ${originalText}`;
                document.getElementById('heading-time').textContent = `Time Response: ${originalText}`;
                document.getElementById('heading-3d').textContent = `3D Visualization: ${originalText}`;

                const phaseContainer = document.getElementById('phase-portrait');
                if (phaseContainer) phaseContainer.setAttribute('aria-label', `Interactive phase portrait showing system trajectories and vector fields for ${originalText}`);

                const timeContainer = document.getElementById('time-response-chart');
                if (timeContainer) timeContainer.setAttribute('aria-label', `Interactive time response chart showing system states over time for ${originalText}`);

                const view3dContainer = document.getElementById('3d-view');
                if (view3dContainer) view3dContainer.setAttribute('aria-label', `Interactive 3D visualization of the ${originalText} dynamical system`);

                document.title = `Lyapunov Control Dashboard - ${originalText}`;
            }

            systemSelect.addEventListener('change', () => {
                const sys = systemSelect.value;
                const originalText = systemSelect.options[systemSelect.selectedIndex].text;
                const mainContent = document.querySelector('main');

                syncContextLabels();

                // Remember focus state to restore it after loading
                const hadFocus = document.activeElement === systemSelect;

                // Set loading state
                systemSelect.disabled = true;
                systemSelect.title = "Loading...";
                announcer.textContent = `Loading system ${originalText}...`;

                if (mainContent) {
                    mainContent.setAttribute('aria-busy', 'true');
                }

                const promises = [];
                if (window.updatePhasePortrait) {
                    promises.push(window.updatePhasePortrait(sys));
                }
                if (window.simulateSystem) {
                    promises.push(window.simulateSystem(sys));
                }

                Promise.all(promises).then(() => {
                    // Announce success
                    announcer.textContent = `System ${originalText} loaded successfully.`;
                }).catch(error => {
                    announcer.textContent = `Error loading system ${originalText}.`;
                    // Visual error feedback for sighted users
                    const toast = document.createElement('div');
                    toast.className = 'glass-panel';
                    toast.textContent = `⚠️ Error loading ${originalText}. Please try again.`;
                    toast.setAttribute('aria-hidden', 'true');
                    Object.assign(toast.style, {
                        position: 'fixed', bottom: '24px', right: '24px',
                        borderLeft: '4px solid #ef4444', padding: '16px 24px',
                        zIndex: '1000', opacity: '0', transform: 'translateY(10px)',
                        transition: 'all 0.3s ease'
                    });
                    document.body.appendChild(toast);
                    requestAnimationFrame(() => {
                        toast.style.opacity = '1';
                        toast.style.transform = 'translateY(0)';
                    });
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        toast.style.transform = 'translateY(10px)';
                        setTimeout(() => toast.remove(), 300);
                    }, 5000);
                }).finally(() => {
                    // Restore state
                    systemSelect.disabled = false;
                    systemSelect.removeAttribute('title');
                    if (mainContent) {
                        mainContent.removeAttribute('aria-busy');
                    }
                    // Restore focus if the user was interacting with it
                    if (hadFocus) {
                        systemSelect.focus();
                    }
                });
            });

            syncContextLabels();

            // Global keyboard shortcut
            document.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 's' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'SELECT') {
                    e.preventDefault();
                    systemSelect.focus();

                    // Tactile visual feedback
                    const kbd = document.getElementById('kbd-s');
                    if (kbd) {
                        kbd.style.transform = 'scale(0.85)';
                        kbd.style.backgroundColor = 'rgba(255,255,255,0.2)';
                        setTimeout(() => {
                            kbd.style.transform = 'scale(1)';
                            kbd.style.backgroundColor = 'rgba(255,255,255,0.1)';
                        }, 150);
                    }
                }
            });

            // Initial load
            if (window.updatePhasePortrait) window.updatePhasePortrait('VanDerPol');
            if (window.simulateSystem) window.simulateSystem('VanDerPol');
        });
    </script>
</body>
</html>
